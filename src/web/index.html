<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nas-photo-highlight</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f0f; color: #e8e8e8; font-family: 'Helvetica Neue', sans-serif; min-height: 100vh; }
    header { padding: 2rem 2.5rem 1.5rem; border-bottom: 1px solid #222; display: flex; align-items: baseline; gap: 1.5rem; }
    header h1 { font-size: 1.4rem; font-weight: 400; letter-spacing: 0.1em; color: #fff; }
    header p  { font-size: 0.8rem; color: #555; }
    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; padding: 2rem 2.5rem; }
    .card { background: #181818; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .card:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
    .card video { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: #111; }
    .card-info { padding: 0.9rem 1rem; }
    .card-info .date { font-size: 1rem; font-weight: 500; letter-spacing: 0.05em; }
    .card-info .meta { font-size: 0.75rem; color: #555; margin-top: 0.25rem; }
    #empty { display: none; grid-column: 1 / -1; text-align: center; padding: 5rem; color: #444; font-size: 0.9rem; line-height: 2; white-space: pre-line; }
  </style>
</head>
<body>
  <header>
    <h1>PHOTO HIGHLIGHTS</h1>
    <p id="subtitle">Loading...</p>
  </header>
  <div id="grid"><p id="empty"></p></div>
  <script>
    async function load() {
      const grid = document.getElementById('grid')
      const subtitle = document.getElementById('subtitle')
      const empty = document.getElementById('empty')
      let highlights = []
      try {
        const res = await fetch('/highlights.json')
        if (!res.ok) throw new Error()
        highlights = await res.json()
      } catch {
        empty.style.display = 'block'
        empty.textContent = 'highlights.json が見つかりません。\nMacでパイプラインを実行してください。'
        subtitle.textContent = '0 highlights'
        return
      }
      subtitle.textContent = `${highlights.length} highlight${highlights.length !== 1 ? 's' : ''}`
      if (highlights.length === 0) {
        empty.style.display = 'block'
        empty.textContent = 'まだハイライトがありません。\nMacでパイプラインを実行してください。'
        return
      }
      for (const h of highlights) {
        const url = `/media/${h.relative_path}`
        const card = document.createElement('div')
        card.className = 'card'
        card.innerHTML = `
          <video src="${url}" muted loop preload="metadata"
                 onmouseenter="this.play()" onmouseleave="this.pause();this.currentTime=0"></video>
          <div class="card-info">
            <div class="date">${h.group_key}</div>
            <div class="meta">${h.image_count} photos · ${new Date(h.created_at).toLocaleDateString('ja-JP')}</div>
          </div>`
        card.querySelector('video').addEventListener('click', () => window.open(url, '_blank'))
        grid.appendChild(card)
      }
    }
    load()
  </script>
</body>
</html>
