services:
  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      # メタ出力先: index.html / highlights.json / last-run.json
      - /volume1/highlights:/usr/share/nginx/meta:ro
      # 動画出力先: PhotoLibrary/{yyyy}/{mm}/*.mp4
      - /volume1/Photos/PhotoLibrary:/usr/share/nginx/media:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
