server {
    listen 80;

    root /usr/share/nginx/meta;
    index index.html;

    # highlights.json — no cache so the UI always sees fresh data
    location = /highlights.json {
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "*";
    }

    # index.html and meta files live in the meta output directory
    location / {
        try_files $uri $uri/ /index.html;
    }

    # mp4 streaming — range request support for seeking
    # Files are served under /media/... from the PhotoLibrary mount.
    location /media/ {
        alias /usr/share/nginx/media/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }
}
